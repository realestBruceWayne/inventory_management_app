services:
  - type: web
    name: inventory-management-api
    env: python
    plan: free
    buildCommand: cd backend && pip install -e .
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: API_KEY
        generateValue: true

databases:
  - name: inventory-db
    databaseName: inventory
    user: inventory_user